---
name: Go Tests (sourcetool)

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  go-versions:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      latest: ${{ steps.go-versions.outputs.GO_VERSION_STABLE }}
      previous: ${{ steps.go-versions.outputs.GO_VERSION_PREVIOUS }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: carabiner-dev/actions/go/versions@360ffa1eb909b0105d4eccb6d6ef337911c34952 # v1.1.6
        id: go-versions

  unit-test:
    needs: go-versions
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        go-version:
          - ${{ needs.go-versions.outputs.latest }}
          - ${{ needs.go-versions.outputs.previous }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache: false

      - name: Run Go tests
        run: |
          go test -v ./...

  test:
    needs: [unit-test, verify]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All tests passed"

  verify:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: carabiner-dev/actions/go/versions@360ffa1eb909b0105d4eccb6d6ef337911c34952 # v1.1.6
        id: go-versions

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ steps.go-versions.outputs.GO_VERSION_STABLE }}
          check-latest: true
          cache: false

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0

      - name: Setup protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # @v3.0.0

      - name: Check generated fakes
        run: |
          hack/verify-fakes.sh

      - name: Check protobuf generated code
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          hack/verify-protos.sh
